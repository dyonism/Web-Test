<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Test by Dyon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* Splash Screen */
    #splash {
      position: fixed;
      inset: 0;
      background: url('https://i.imgur.com/pV0Degm.webp') no-repeat center center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      transition: opacity 1s ease, visibility 1s ease;
    }

    #splash.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .splash-btn {
      background: rgba(255, 215, 0, 0.85);
      color: #1a1a2e;
      border: none;
      padding: 18px 50px;
      border-radius: 50px;
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      transition: all 0.3s;
    }

    .splash-btn:hover {
      transform: scale(1.08);
      background: rgba(255, 235, 100, 0.95);
      box-shadow: 0 15px 40px rgba(255, 215, 0, 0.6);
    }

    /* Main Content (Attendance) */
    #main-content {
      position: fixed;
      inset: 0;
      background: url('https://i.imgur.com/pV0Degm.webp') no-repeat center center fixed;
      background-size: cover;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.7));
      backdrop-filter: blur(6px);
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(30, 30, 60, 0.6);
      backdrop-filter: blur(15px);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255, 220, 100, 0.3);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
    }

    .title {
      font-size: 2.4rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
      color: #fffacd;
      text-shadow: 0 4px 20px rgba(255, 250, 205, 0.7);
    }

    .question {
      font-size: 1.6rem;
      margin-bottom: 2rem;
      color: #e0ffff;
      text-shadow: 0 2px 10px rgba(224, 255, 255, 0.5);
    }

    input {
      width: 100%;
      padding: 16px;
      margin-bottom: 1.5rem;
      border: none;
      border-radius: 16px;
      font-size: 1.2rem;
      background: rgba(255, 255, 255, 0.22);
      color: white;
      outline: none;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    button.submit-btn {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a1a2e;
      border: none;
      padding: 14px 50px;
      border-radius: 16px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    button.submit-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(255, 215, 0, 0.6);
    }

    #message {
      margin-top: 1.5rem;
      font-size: 1.3rem;
      color: #98fb98;
    }

    .visitor-section {
      margin-top: 2rem;
      text-align: left;
    }

    .visitor-section h3 {
      color: #ffd700;
      margin-bottom: 1rem;
    }

    .name-item {
      background: rgba(255, 255, 255, 0.1);
      padding: 8px 12px;
      border-radius: 10px;
      margin: 6px 0;
    }
  </style>
</head>

<body>

  <!-- Splash Screen -->
  <div id="splash">
    <button class="splash-btn">Hii this is web test by dyon</button>
  </div>

  <!-- Main Attendance Content -->
  <div id="main-content">
    <div class="overlay"></div>
    <div class="card">
      <div class="title">THANKS FOR VISITING</div>
      <div class="question">WHO ARE YOU ?</div>

      <input type="text" id="nameInput" placeholder="your name" maxlength="25" />
      <button class="submit-btn" id="submitBtn">Submit</button>

      <div id="message"></div>

      <div class="visitor-section hidden" id="visitorSection">
        <h3>Visitors so far:</h3>
        <div id="list"></div>
      </div>
    </div>
  </div>

  <script>
    const splash = document.getElementById('splash');
    const mainContent = document.getElementById('main-content');
    const splashBtn = document.querySelector('.splash-btn');
    // Click splash button to show main content
    splashBtn.addEventListener('click', () => {
      splash.classList.add('hidden');
      setTimeout(() => {
        splash.style.display = 'none';
        mainContent.style.display = 'flex';
      }, 1000); // Match transition time
    });
    // Attendance logic (same as before)
    const nameInput = document.getElementById('nameInput');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');
    const listDiv = document.getElementById('list');
    const visitorSection = document.getElementById('visitorSection');
    let visitors = JSON.parse(localStorage.getItem('visitorNames')) || [];
    if (visitors.length > 0) {
      visitorSection.classList.remove('hidden');
      updateVisitors();
    }
    submitBtn.addEventListener('click', () => {
      let name = nameInput.value.trim();
      if (!name) {
        message.textContent = "Hey~ tell me your name first ♡";
        message.style.color = '#ffcccc';
        return;
      }
      name = name.charAt(0).toUpperCase() + name.slice(1);
      if (visitors.includes(name)) {
        message.textContent = `Welcome back, ${name}! ♡`;
      } else {
        visitors.push(name);
        localStorage.setItem('visitorNames', JSON.stringify(visitors));
        message.textContent = `Thanks for visiting, ${name} ~ ♡`;
        visitorSection.classList.remove('hidden');
        updateVisitors();
      }
      nameInput.value = '';
    });

    function updateVisitors() {
      listDiv.innerHTML = '';
      visitors.forEach(name => {
        const item = document.createElement('div');
        item.className = 'name-item';
        item.textContent = name;
        listDiv.appendChild(item);
      });
    }
  </script>
</body>

</html>
